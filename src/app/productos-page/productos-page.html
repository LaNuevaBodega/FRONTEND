<div class="productos-layout">
    
  <app-product-list
  [triggerRefrescar]="triggerRefrescar"
  (productoSeleccionado)="onProductoSeleccionado($event)"
  (agregar)="onAgregar()"
  (exportarBalanza)="onExportarBalanza()">
  </app-product-list>
  
  <app-product-detail [producto]="productoSeleccionado" 
  (editar)="onEditar($event)" 
  (eliminar)="onEliminar($event)"
  (ajustarStock)="abrirAjuste($event)">
  </app-product-detail>

</div>
