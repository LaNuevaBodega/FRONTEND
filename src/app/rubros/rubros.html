<div class="page">

  <div class="page-header">

    <h1>Rubros</h1>

    <div class="header-actions">

      <button mat-raised-button color="primary" (click)="abrirDialogo()">
        <mat-icon>add</mat-icon>
        Nuevo 
      </button>

    </div>

  </div>

  <div class="tabla-wrapper">

    <table mat-table [dataSource]="rubros" class="mat-elevation-z2">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>

        <td mat-cell *matCellDef="let rubro">
          {{ rubro.id }}
        </td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>

        <td mat-cell *matCellDef="let rubro">
          {{ rubro.nombre }}
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">

        <th mat-header-cell *matHeaderCellDef>Acciones</th>

        <td mat-cell *matCellDef="let rubro">

          <button
            mat-icon-button
            color="primary"
            (click)="abrirDialogo(rubro)"
          >
            <mat-icon>edit</mat-icon>
          </button>

          <button
            mat-icon-button
            color="warn"
            (click)="eliminarRubro(rubro.id, rubro.nombre)"
          >
            <mat-icon>delete</mat-icon>
          </button>

        </td>

      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="columnasMostradas; sticky: true"
      ></tr>

      <tr
        mat-row
        *matRowDef="let row; columns: columnasMostradas;"
      ></tr>

    </table>

    <div *ngIf="rubros.length === 0" class="empty">
      No hay rubros cargados
    </div>

  </div>

</div>
