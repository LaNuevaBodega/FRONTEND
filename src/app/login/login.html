<div class="login-root">
  <mat-card class="login-card">
    <div class="logo">
      <img src="logo.png" alt="logo">
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="off" novalidate>
      
      <mat-form-field appearance="outline" class="field">
        <mat-label>Usuario o Email</mat-label>
        <input matInput formControlName="identificador" placeholder="Usuario o Email" required>
        <mat-error *ngIf="f['identificador']?.touched && f['identificador']?.invalid">
          <span *ngIf="f['identificador']?.errors?.['required']">Este campo es obligatorio.</span>
        </mat-error>
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="field">
        <mat-label>Contraseña</mat-label>
        <input matInput type="password" formControlName="password" placeholder="Contraseña" required minlength="4">
        <mat-error *ngIf="f['password']?.touched && f['password']?.invalid">
          <span *ngIf="f['password']?.errors?.['required']">La contraseña es obligatoria.</span>
          <span *ngIf="f['password']?.errors?.['minlength']">Mínimo 4 caracteres.</span>
        </mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || submitting" class="login-btn">Login</button>
    </form>
  </mat-card>
</div>
