<div class="login-root">
  <div class="login-card">

    <!-- Panel de marca -->
    <aside class="brand-panel">
      <div class="brand-overlay"></div>
      <div class="brand-content">
        <div class="logo-badge">
          <img src="logo.png" alt="La Nueva Bodega">
        </div>
        <h1 class="brand-title">La Nueva Bodega</h1>
        <p class="brand-tagline">Sistema de gestión de inventario y ventas</p>
      </div>
    </aside>

    <!-- Panel de formulario -->
    <section class="form-panel">
      <div class="form-wrap">
        <h2>Iniciar sesión</h2>
        <p class="subtitle">Accedé a tu cuenta para continuar</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="off" novalidate>
          <mat-form-field appearance="outline" class="field">
            <mat-label>Usuario o Email</mat-label>
            <mat-icon matPrefix>person_outline</mat-icon>
            <input matInput formControlName="identificador">
            <mat-error *ngIf="f['identificador']?.touched && f['identificador']?.invalid">
              Campo obligatorio
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="field">
            <mat-label>Contraseña</mat-label>
            <mat-icon matPrefix>lock_outline</mat-icon>
            <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password">
            <button mat-icon-button matSuffix type="button" tabindex="-1"
              (click)="showPassword = !showPassword"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="f['password']?.touched && f['password']?.invalid">
              Mínimo 4 caracteres
            </mat-error>
          </mat-form-field>

          <button mat-raised-button color="primary" type="submit" class="login-btn"
            [disabled]="loginForm.invalid || submitting">
            <mat-icon *ngIf="!submitting">login</mat-icon>
            {{ submitting ? 'Ingresando…' : 'Ingresar' }}
          </button>
        </form>
      </div>
    </section>

  </div>
</div>
