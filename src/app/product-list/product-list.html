<div class="list-container">

  <div class="header-lista">

    <div class="buscador">
      <input type="text" [formControl]="searchControl" placeholder="Buscar..." />
    </div>

    <button mat-flat-button color="primary" (click)="agregar.emit()">
      <mat-icon>add</mat-icon> Agregar
    </button>

    <button mat-flat-button color="primary" (click)="exportarBalanza.emit()" title="Descarga CSV con PLU para cargar en la balanza Systel">
      <mat-icon>download</mat-icon> Exportar PLU Balanza
    </button>

  </div>

  <div class="tabla-productos" (scroll)="onScroll($event)">

    <table>
      <thead>
        <tr>
          <th>Código / Nombre</th>
        </tr>
      </thead>

      <tbody>

        <tr class="grupo-header">
          <td> PRODUCTOS ELABORADOS</td>
        </tr>

        <tr *ngFor="let p of productosElaborados" (click)="seleccionar(p)">
          <td>
            <span class="codigo">({{ p.codigo }})</span>
            <span class="nombre">{{ p.nombre }}</span>
          </td>
        </tr>

        <tr class="grupo-header">
          <td> PRODUCTOS DE STOCK</td>
        </tr>

        <tr *ngFor="let p of productosStock" (click)="seleccionar(p)">
          <td>
            <span class="codigo">({{ p.codigo }})</span>
            <span class="nombre">{{ p.nombre }}</span>
          </td>
        </tr>

      </tbody>

    </table>

    <div *ngIf="cargando" class="estado">Cargando...</div>
    <div *ngIf="noHayMas && !cargando" class="estado">Fin</div>
  </div>

</div>
