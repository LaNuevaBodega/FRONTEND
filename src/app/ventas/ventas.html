<div class="ventas-workspace">

  <div class="caja-bar">
    <mat-slide-toggle
      [checked]="!!cajaAbierta"
      [disabled]="cargandoCaja"
      (change)="onToggleCaja($event)">
      Caja {{ cajaAbierta ? 'Abierta' : 'Cerrada' }}
    </mat-slide-toggle>
  </div>  

  <div class="productos-panel">
    <app-stock
      (productoSeleccionadoParaCarrito)="carrito.agregarProducto($event)">
    </app-stock>
  </div>

  <div class="carrito-panel">
    <app-carrito
      #carrito
      (confirmarVenta)="crearVenta($event)">
    </app-carrito>
  </div>

</div>
