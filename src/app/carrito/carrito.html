<div class="carrito-container">

  <div class="tabla-carrito-wrapper">
    <table *ngIf="carrito.length > 0">
      <thead>
        <tr>
          <th class="col-prod">Producto</th>
          <th class="col-precio">Precio</th>
          <th class="col-cant">Cant.</th>
          <th class="col-sub">Subtotal</th>
          <th class="col-acc"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of carrito">
          <td class="col-prod">
            <div class="nombre" [title]="item.producto.nombre">{{item.producto.nombre}}</div>
            <div class="codigo">{{item.producto.codigo}}</div>
          </td>
          <td class="col-precio">${{ item.producto.precioVenta | number:'1.2-2' }}</td>
          <td class="col-cant">
            <div class="stepper">
              <button (click)="disminuirCantidad(item)" aria-label="Disminuir">−</button>
              <span>{{item.cantidad}}</span>
              <button (click)="aumentarCantidad(item)" aria-label="Aumentar">+</button>
            </div>
          </td>
          <td class="col-sub">${{ (item.producto.precioVenta * item.cantidad) | number:'1.2-2' }}</td>
          <td class="col-acc">
            <button class="btn-eliminar" (click)="eliminarProducto(item)" aria-label="Quitar">×</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="carrito.length === 0" class="vacio">
      <em>El carrito está vacío</em>
    </div>
  </div>

  <div class="total-pagar">
    <strong>Total: ${{ total | number:'1.2-2' }}</strong>
    <button class="btn-pagar" (click)="abrirDialogoPago()">Pagar</button>
  </div>

</div>
