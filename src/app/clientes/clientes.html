<div class="page">

  <div class="page-header">
    <h1>Clientes</h1>
    <div class="header-actions">
      <div class="search-container" [class.visible]="searchVisible">
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="search-field">
          <mat-label>Buscar</mat-label>
          <input matInput #searchInput [(ngModel)]="filtro" (input)="aplicarFiltro()" placeholder="Razón social o CUIT...">
          <button mat-icon-button matSuffix *ngIf="filtro" (click)="limpiarBusqueda()">
            <mat-icon>close</mat-icon>
          </button>
        </mat-form-field>
      </div>
      <button mat-icon-button (click)="toggleSearch()" matTooltip="Buscar cliente">
        <mat-icon>search</mat-icon>
      </button>
      <button mat-raised-button color="primary" (click)="abrirCrear()">
         <mat-icon>add</mat-icon>Nuevo
      </button>
    </div>
  </div>

  <div class="spinner-wrapper" *ngIf="cargando">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div class="tabla-wrapper" *ngIf="!cargando">

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

      <ng-container matColumnDef="razonSocial">
        <th mat-header-cell *matHeaderCellDef>Razón social</th>
        <td mat-cell *matCellDef="let c">{{ c.razonSocial }}</td>
      </ng-container>

      <ng-container matColumnDef="cuit">
        <th mat-header-cell *matHeaderCellDef>CUIT</th>
        <td mat-cell *matCellDef="let c">{{ c.cuit ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="condicionIva">
        <th mat-header-cell *matHeaderCellDef>Condición de IVA</th>
        <td mat-cell *matCellDef="let c">{{ c.condicionIvaNombre }}</td>
      </ng-container>

      <ng-container matColumnDef="claseComprobante">
        <th mat-header-cell *matHeaderCellDef>Comprobante</th>
        <td mat-cell *matCellDef="let c">
          <span class="clase-badge clase-{{ c.claseComprobante.toLowerCase() }}">
            Factura {{ c.claseComprobante }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let c" class="acciones-cell">
          <button mat-icon-button (click)="abrirEditar(c)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(c)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;"></tr>

    </table>

    <div *ngIf="dataSource.filteredData.length === 0" class="empty">
      {{ filtro ? 'Sin resultados para "' + filtro + '"' : 'No hay clientes registrados' }}
    </div>

  </div>

</div>
