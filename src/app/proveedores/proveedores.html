<div class="page">

  <div class="page-header">

    <h1>Proveedores</h1>

    <div class="header-actions">

      <button mat-raised-button color="primary" (click)="abrirDialogo()">
        <mat-icon>add</mat-icon>
        Nuevo
      </button>

    </div>

  </div>

  <div class="tabla-wrapper">

    <table mat-table [dataSource]="proveedores" class="mat-elevation-z2">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let proveedor">
          {{ proveedor.id }}
        </td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let proveedor">
          {{ proveedor.nombre }}
        </td>
      </ng-container>

      <ng-container matColumnDef="cuit">
        <th mat-header-cell *matHeaderCellDef>CUIT</th>
        <td mat-cell *matCellDef="let proveedor">
          {{ proveedor.cuit }}
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>

        <td mat-cell *matCellDef="let proveedor">

          <button mat-icon-button color="primary"
                  (click)="abrirDialogo(proveedor)">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button color="warn"
                  (click)="eliminarProveedor(proveedor.id, proveedor.nombre)">
            <mat-icon>delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnasMostradas; sticky: true"></tr>

      <tr mat-row *matRowDef="let row; columns: columnasMostradas;"></tr>

    </table>

    <div *ngIf="proveedores.length === 0" class="empty">
      No hay proveedores cargados
    </div>

  </div>

</div>
