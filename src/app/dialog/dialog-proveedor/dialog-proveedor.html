<h2 mat-dialog-title>
    {{ data ? 'Editar Proveedor: ' + data.nombre : 'Crear nuevo proveedor' }}
</h2>

<div mat-dialog-content class="rubro-dialog-container">
    <form [formGroup]="proveedorForm">
        
        <!-- Campo Nombre -->
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Nombre del Proveedor</mat-label>
            <input matInput formControlName="nombre" placeholder="Ej: Distribuidora XYZ">
            
            <mat-error *ngIf="proveedorForm.get('nombre')?.invalid && proveedorForm.get('nombre')?.touched">
                El nombre es obligatorio.
            </mat-error>
        </mat-form-field>

        <!-- Campo CUIT -->
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>CUIT (Opcional)</mat-label> 
            <input matInput formControlName="cuit" placeholder="Ej: 30-12345678-9">
            
            <mat-error *ngIf="proveedorForm.get('cuit')?.hasError('pattern') && proveedorForm.get('cuit')?.touched">
                Formato de CUIT inválido (Ej: XX-XXXXXXXX-X).
            </mat-error>
        </mat-form-field>

    </form>
</div>

<div mat-dialog-actions align="end" class="rubro-dialog-container">
    <button mat-button [mat-dialog-close]="false">
        Cancelar
    </button>
    <button mat-raised-button color="primary" [disabled]="proveedorForm.invalid" (click)="guardar()">
        Guardar
    </button>
</div>
