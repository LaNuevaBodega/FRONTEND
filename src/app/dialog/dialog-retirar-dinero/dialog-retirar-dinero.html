<h2 mat-dialog-title>
  <mat-icon class="titulo-icon">payments</mat-icon>
  Retiro de Dinero
</h2>

<mat-dialog-content>
  <p class="subtitulo">Complete los datos del retiro para registrarlo en el movimiento de caja.</p>

  <mat-form-field appearance="outline" class="campo-full">
    <mat-label>Monto a retirar</mat-label>
    <span matTextPrefix>$&nbsp;</span>
    <input matInput type="number" [(ngModel)]="monto" min="0.01" step="0.01"
           (keydown.enter)="confirmar()" cdkFocusInitial>
  </mat-form-field>

  <mat-form-field appearance="outline" class="campo-full">
    <mat-label>Motivo (opcional)</mat-label>
    <input matInput type="text" [(ngModel)]="motivo" placeholder="Ej: Pago a proveedor">
    <mat-icon matSuffix>edit_note</mat-icon>
  </mat-form-field>

  <p class="error-msg" *ngIf="error">{{ error }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="confirmar()">
    <mat-icon>remove_circle_outline</mat-icon>
    Confirmar retiro
  </button>
</mat-dialog-actions>
