<h2 mat-dialog-title>
  <mat-icon class="titulo-icon">point_of_sale</mat-icon>
  Apertura de Caja
</h2>

<mat-dialog-content>
  <p class="subtitulo">Ingrese el monto de efectivo con el que inicia la caja.</p>
  <mat-form-field appearance="outline" class="campo-monto">
    <mat-label>Monto inicial</mat-label>
    <span matTextPrefix>$&nbsp;</span>
    <input matInput type="number" [(ngModel)]="montoInicial" min="0" step="0.01"
           (keydown.enter)="confirmar()" cdkFocusInitial>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="confirmar()" [disabled]="montoInicial < 0">
    <mat-icon>lock_open</mat-icon>
    Abrir caja
  </button>
</mat-dialog-actions>
