<h2>Método de pago</h2>

<div class="metodos">
  <button
    mat-raised-button
    *ngFor="let m of metodos"
    (click)="seleccionarPago(m.id)"
    [color]="metodoSeleccionadoId === m.id ? 'primary' : undefined">
    {{ m.nombre }}
  </button>
</div>

<div class="acciones">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button
    mat-raised-button
    color="primary"
    (click)="onConfirm()"
    [disabled]="!metodoSeleccionadoId">
    Confirmar
  </button>
</div>
