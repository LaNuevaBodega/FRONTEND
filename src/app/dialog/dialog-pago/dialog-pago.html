<h2>Método de pago</h2>

<div class="metodos">
  <button
    mat-raised-button
    *ngFor="let m of metodos; let i = index"
    (click)="seleccionarPago(m.id)"
    [class.seleccionado]="metodoSeleccionadoId === m.id">

    {{ m.nombre }} ({{ i + 1 }})
  </button>
</div>

<div class="acciones">
  <button mat-button (click)="onCancel()">Cancelar</button>

  <button
    mat-raised-button
    color="primary"
    (click)="onConfirm()"
    [disabled]="!metodoSeleccionadoId">
    Confirmar
  </button>
</div>
