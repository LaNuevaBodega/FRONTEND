<mat-sidenav-container class="app-sidenav-container">

    <mat-sidenav #sidenav class="app-sidenav" mode="side" [opened]="isSidebarOpen()" (mouseenter)="toggleSidebar(true)"
        (mouseleave)="toggleSidebar(false)">

        <mat-nav-list>

            <a mat-list-item routerLink="/app/ventas" routerLinkActive="active">

                <span>Mostrador 🧾</span>
            </a>

            <a mat-list-item routerLink="/app/ventas/historial" routerLinkActive="active">

                <span>Historial 🧾</span>
            </a>

            <a mat-list-item routerLink="/app/proveedores" routerLinkActive="active">

                <span>Proveedores 🚚</span>
            </a>

            <a mat-list-item routerLink="/app/productos" routerLinkActive="active">

                <span>Productos 📦</span>
            </a>

            <a mat-list-item routerLink="/app/rubros" routerLinkActive="active">

                <span>Rubros 🗂️</span>
            </a>

            <a mat-list-item (click)="onLogout()" class="logout-link">

                <span>Cerrar sesión 🔒</span>
            </a>

            <div *ngIf="authService.isLoggedIn()" class="user-info">
                <strong>{{ authService.userName }}</strong>
                <div>📧 {{ authService.email }}</div>
                <div>🖥️ Máquina: {{ authService.maquinaId }}</div>
                <div *ngIf="authService.isAdmin">🎭 Administrador</div>
                <div *ngIf="authService.isEmpleado">👷 Empleado</div>
            </div>


        </mat-nav-list>


    </mat-sidenav>

    <mat-sidenav-content class="main-content-area">

        <mat-toolbar color="primary">
            <button mat-icon-button (click)="toggleSidebar()">
                <mat-icon>menu</mat-icon>
            </button>
            <span class="spacer"></span>
            <button mat-button></button>
        </mat-toolbar>

        <div class="router-content">
            <router-outlet></router-outlet>
        </div>

        <div class="header">

            <button pButton type="button" label="Cerrar Sesión" icon="pi pi-sign-out" (click)="onLogout()"
                class="p-button-danger p-button-text">
            </button>
        </div>

    </mat-sidenav-content>

</mat-sidenav-container>
