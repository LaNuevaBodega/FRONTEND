<mat-sidenav-container class="app-sidenav-container">

    <mat-sidenav #sidenav class="app-sidenav" mode="side" [opened]="isSidebarOpen()">
   
        <mat-nav-list>

            <a mat-list-item routerLink="/app/ventas" routerLinkActive="active">
                <span>🛒 MOSTRADOR</span>
            </a>

            <a mat-list-item routerLink="/app/ventas/historial" routerLinkActive="active">
                <span>📜 HISTORIAL</span>
            </a>

            <a mat-list-item routerLink="/app/historialcaja" routerLinkActive="active">
                <span>💵 CAJA</span>                
            </a>

            <a mat-list-item routerLink="/app/productos" routerLinkActive="active">
                <span>📦 PRODUCTOS</span>
            </a>

            <a mat-list-item routerLink="/app/proveedores" routerLinkActive="active">
                <span>🚛 PROVEEDORES</span>
            </a>

            <a mat-list-item routerLink="/app/rubros" routerLinkActive="active">
                <span>🏷️ RUBROS</span>
            </a>

            <a mat-list-item routerLink="/app/clientes" routerLinkActive="active">
                <span>👥 CLIENTES</span>
            </a>

            <a mat-list-item routerLink="/app/condicioniva" routerLinkActive="active">
                <span>🧾 CONDICIÓN IVA</span>
            </a>
            
            <div *ngIf="authService.isLoggedIn()" class="user-info">
                <strong>👤 {{ authService.userName.toUpperCase() }}</strong>

                <div>📧 {{ authService.email }}</div>

                <div>🖥️ MÁQUINA: {{ authService.maquinaId }}</div>

                <div *ngIf="authService.isAdmin">
                    👑 ADMINISTRADOR
                </div>

                <div *ngIf="authService.isEmpleado">
                    🛠️ EMPLEADO
                </div>
            </div>
            
            <a mat-list-item (click)="onLogout()" class="logout-link">
                <span>🔒 CERRAR SESIÓN</span>
            </a>

        </mat-nav-list>

    </mat-sidenav>

    <mat-sidenav-content class="main-content-area">

        <mat-toolbar color="primary" class="app-toolbar">

            <button mat-icon-button (click)="toggleSidebar()">
                <mat-icon>menu</mat-icon>
            </button>
            
            <span class="spacer"></span>

        </mat-toolbar>

        <div class="router-content">
            <router-outlet></router-outlet>
        </div>

    </mat-sidenav-content>

</mat-sidenav-container>
